<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صلاتي فاس</title>
    <style>
        :root {
            --emerald: #508d69;
            --light-emerald: #d0e7d2;
            --black: #000000;
            --bg-gray: #f0f0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Header & Date */
        .date-container {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--black);
            margin-bottom: 25px;
        }

        /* Timer Styles - التعديل هنا باش يجي ف الوسط */
        #timer {
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--black);
            display: block;
            width: 100%;
            margin: 0 auto;
            text-align: center; /* هادي هي اللي كتجيبو للوسط */
            line-height: 1;
            letter-spacing: -2px;
        }

        .next-prayer-label {
            display: inline-block;
            background-color: var(--light-emerald);
            color: var(--emerald);
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            margin: 15px 0 35px;
            font-size: 0.9rem;
        }

        /* Prayer List */
        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .prayer-item.active {
            border: 2px solid var(--emerald);
            background-color: rgba(80, 141, 105, 0.05);
        }

        .prayer-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--black);
        }

        .prayer-time {
            font-size: 1.3rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--black);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="date-container" id="full-date">
        </div>

    <div id="timer">00:00:00</div>
    
    <div class="next-prayer-label" id="next-label">
        الوقت المتبقي لصلاة الفجر
    </div>

    <div class="prayer-list">
        <div class="prayer-item" id="fajr-row">
            <span class="prayer-time">04:18</span>
            <span class="prayer-name">الفجر</span>
        </div>
        <div class="prayer-item" id="dhuhr-row">
            <span class="prayer-time">12:25</span>
            <span class="prayer-name">الظهر</span>
        </div>
        <div class="prayer-item" id="asr-row">
            <span class="prayer-time">15:58</span>
            <span class="prayer-name">العصر</span>
        </div>
        <div class="prayer-item" id="maghrib-row">
            <span class="prayer-time">18:55</span>
            <span class="prayer-name">المغرب</span>
        </div>
        <div class="prayer-item" id="isha-row">
            <span class="prayer-time">20:13</span>
            <span class="prayer-name">العشاء</span>
        </div>
    </div>
</div>

<script>
    // بيانات الصلاة لمدينة فاس (تقديرية بناء على الصورة)
    const prayerTimes = {
        "الفجر": "04:18",
        "الظهر": "12:25",
        "العصر": "15:58",
        "المغرب": "18:55",
        "العشاء": "20:13"
    };

    function updateClock() {
        const now = new Date();
        
        // تحديث التاريخ
        const options = { day: 'numeric', month: 'short', year: 'numeric' };
        const hijriDate = "26 شَوَّال 1447 هـ"; // هادي خاصها API حقيقية ولكن خليتها كمتال
        document.getElementById('full-date').innerText = `${hijriDate} | ${now.toLocaleDateString('en-GB', options)}`;

        let nextPrayer = "";
        let nextTime = null;

        const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        // البحث عن الصلاة القادمة
        for (const [name, time] of Object.entries(prayerTimes)) {
            if (time > currentTimeStr) {
                nextPrayer = name;
                const [h, m] = time.split(':');
                nextTime = new Date();
                nextTime.setHours(h, m, 0);
                break;
            }
        }

        // إذا فات العشاء، الصلاة القادمة هي الفجر
        if (!nextPrayer) {
            nextPrayer = "الفجر";
            const [h, m] = prayerTimes["الفجر"].split(':');
            nextTime = new Date();
            nextTime.setDate(nextTime.getDate() + 1);
            nextTime.setHours(h, m, 0);
        }

        document.getElementById('next-label').innerText = `الوقت المتبقي لصلاة ${nextPrayer}`;

        // حساب العداد
        const diff = nextTime - now;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        document.getElementById('timer').innerText = 
            `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

        // تمييز الصلاة الحالية
        Object.keys(prayerTimes).forEach(p => {
            const rowId = p === "الفجر" ? "fajr-row" : p === "الظهر" ? "dhuhr-row" : p === "العصر" ? "asr-row" : p === "المغرب" ? "maghrib-row" : "isha-row";
            document.getElementById(rowId).classList.remove('active');
        });
        // مثال: تمييز الفجر بناء على الصورة
        document.getElementById('fajr-row').classList.add('active');
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
