<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صلاتي فاس</title>
    <style>
        :root {
            --emerald: #508d69;
            --light-emerald: #d0e7d2;
            --black: #000000;
            --bg-gray: #f0f0f0;
        }

        /* ضبط شامل باش ما يهرب والو للجنب */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-gray);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden; /* كيمنع التحرك الجانبي فالتطبيق */
        }

        .container {
            background-color: #ffffff;
            width: 90%; /* عرض مرن كيتناسب مع التطبيق */
            max-width: 350px;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center; /* فرض التمركز في الوسط لجميع العناصر */
        }

        .date-container {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--black);
            margin-bottom: 10px;
            width: 100%;
        }

        /* العداد: رديتو Flex باش يجي ف الوسط بزز من WebToNative */
        #timer-box {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 5px 0;
        }

        #timer {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--black);
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .next-prayer-label {
            background-color: var(--light-emerald);
            color: var(--emerald);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0 20px;
            font-size: 0.8rem;
        }

        .prayer-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-radius: 12px;
            width: 100%;
        }

        .prayer-item.active {
            border: 1.5px solid var(--emerald);
            background-color: rgba(80, 141, 105, 0.05);
        }

        .prayer-name, .prayer-time {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--black);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="date-container" id="full-date"></div>

    <div id="timer-box">
        <div id="timer">00:00:00</div>
    </div>
    
    <div class="next-prayer-label" id="next-label">جاري الحساب...</div>

    <div class="prayer-list">
        <div class="prayer-item" id="fajr-row"><span class="prayer-time">04:18</span><span class="prayer-name">الفجر</span></div>
        <div class="prayer-item" id="dhuhr-row"><span class="prayer-time">12:25</span><span class="prayer-name">الظهر</span></div>
        <div class="prayer-item" id="asr-row"><span class="prayer-time">15:58</span><span class="prayer-name">العصر</span></div>
        <div class="prayer-item" id="maghrib-row"><span class="prayer-time">18:55</span><span class="prayer-name">المغرب</span></div>
        <div class="prayer-item" id="isha-row"><span class="prayer-time">20:13</span><span class="prayer-name">العشاء</span></div>
    </div>
</div>

<script>
    const prayerTimes = {"الفجر":"04:18","الظهر":"12:25","العصر":"15:58","المغرب":"18:55","العشاء":"20:13"};

    function updateClock() {
        const now = new Date();
        const options = { day: 'numeric', month: 'short', year: 'numeric' };
        document.getElementById('full-date').innerHTML = `26 شَوَّال 1447 هـ<br>${now.toLocaleDateString('en-GB', options)}`;

        let nextPrayer = "", nextTime = null;
        const currentMin = now.getHours() * 60 + now.getMinutes();

        for (const [name, time] of Object.entries(prayerTimes)) {
            const [h, m] = time.split(':').map(Number);
            if ((h * 60 + m) > currentMin) {
                nextPrayer = name; nextTime = new Date(); nextTime.setHours(h, m, 0); break;
            }
        }
        if (!nextPrayer) {
            nextPrayer = "الفجر"; const [h, m] = prayerTimes["الفجر"].split(':').map(Number);
            nextTime = new Date(); nextTime.setDate(nextTime.getDate() + 1); nextTime.setHours(h, m, 0);
        }

        document.getElementById('next-label').innerText = `الوقت المتبقي لصلاة ${nextPrayer}`;
        const diff = nextTime - now;
        const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

        Object.keys(prayerTimes).forEach(p => {
            const id = p === "الفجر" ? "fajr-row" : p === "الظهر" ? "dhuhr-row" : p === "العصر" ? "asr-row" : p === "المغرب" ? "maghrib-row" : "isha-row";
            document.getElementById(id).classList.remove('active');
            if(p === nextPrayer) document.getElementById(id).classList.add('active');
        });
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
