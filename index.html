<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صلاتي فاس</title>
    <style>
        :root {
            --emerald: #508d69;
            --light-emerald: #d0e7d2;
            --black: #000000;
            --bg-gray: #f0f0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* باش يبدا من الفوق شوية */
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 360px; /* قياس مناسب لأغلب الهواتف */
            border-radius: 30px;
            padding: 25px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin-top: 10px;
        }

        /* التاريخ */
        .date-container {
            font-weight: bold;
            font-size: 1rem;
            color: var(--black);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* العداد المعدل ليكون في الوسط وقياسه مناسب */
        #timer {
            font-size: 3.8rem; /* صغرتو شوية باش ما يخرجش على الجنب */
            font-weight: 900;
            color: var(--black);
            display: block;
            width: 100%;
            text-align: center; /* التمركز في الوسط */
            margin: 0 auto;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .next-prayer-label {
            display: inline-block;
            background-color: var(--light-emerald);
            color: var(--emerald);
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin: 15px 0 30px;
            font-size: 0.85rem;
        }

        /* قائمة الصلوات */
        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 5px;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-radius: 12px;
            background-color: transparent;
            border: 1px solid transparent;
        }

        .prayer-item.active {
            border: 1.5px solid var(--emerald);
            background-color: rgba(80, 141, 105, 0.05);
        }

        .prayer-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--black);
        }

        .prayer-time {
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--black);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="date-container" id="full-date">
        </div>

    <div id="timer">00:00:00</div>
    
    <div class="next-prayer-label" id="next-label">
        جاري التحميل...
    </div>

    <div class="prayer-list">
        <div class="prayer-item" id="fajr-row">
            <span class="prayer-time">04:18</span>
            <span class="prayer-name">الفجر</span>
        </div>
        <div class="prayer-item" id="dhuhr-row">
            <span class="prayer-time">12:25</span>
            <span class="prayer-name">الظهر</span>
        </div>
        <div class="prayer-item" id="asr-row">
            <span class="prayer-time">15:58</span>
            <span class="prayer-name">العصر</span>
        </div>
        <div class="prayer-item" id="maghrib-row">
            <span class="prayer-time">18:55</span>
            <span class="prayer-name">المغرب</span>
        </div>
        <div class="prayer-item" id="isha-row">
            <span class="prayer-time">20:13</span>
            <span class="prayer-name">العشاء</span>
        </div>
    </div>
</div>

<script>
    const prayerTimes = {
        "الفجر": "04:18",
        "الظهر": "12:25",
        "العصر": "15:58",
        "المغرب": "18:55",
        "العشاء": "20:13"
    };

    function updateClock() {
        const now = new Date();
        
        // تحديث التاريخ
        const options = { day: 'numeric', month: 'short', year: 'numeric' };
        const hijriDate = "26 شَوَّال 1447 هـ"; 
        document.getElementById('full-date').innerHTML = `${hijriDate}<br>${now.toLocaleDateString('en-GB', options)}`;

        let nextPrayer = "";
        let nextTime = null;

        const hNow = now.getHours();
        const mNow = now.getMinutes();
        const currentTimeInMinutes = hNow * 60 + mNow;

        for (const [name, time] of Object.entries(prayerTimes)) {
            const [h, m] = time.split(':').map(Number);
            const prayerMinutes = h * 60 + m;
            if (prayerMinutes > currentTimeInMinutes) {
                nextPrayer = name;
                nextTime = new Date();
                nextTime.setHours(h, m, 0);
                break;
            }
        }

        if (!nextPrayer) {
            nextPrayer = "الفجر";
            const [h, m] = prayerTimes["الفجر"].split(':').map(Number);
            nextTime = new Date();
            nextTime.setDate(nextTime.getDate() + 1);
            nextTime.setHours(h, m, 0);
        }

        document.getElementById('next-label').innerText = `الوقت المتبقي لصلاة ${nextPrayer}`;

        const diff = nextTime - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById('timer').innerText = 
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

        // تمييز الصلاة القادمة
        Object.keys(prayerTimes).forEach(p => {
            const id = p === "الفجر" ? "fajr-row" : p === "الظهر" ? "dhuhr-row" : p === "العصر" ? "asr-row" : p === "المغرب" ? "maghrib-row" : "isha-row";
            document.getElementById(id).classList.remove('active');
            if(p === nextPrayer) document.getElementById(id).classList.add('active');
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
